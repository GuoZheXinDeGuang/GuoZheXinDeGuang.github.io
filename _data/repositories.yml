featured_repos:
  - name: ERC-3 Earth Rover Challenge
    repo: vivekmattam02/ERC-3-earthrover-challenge
    url: https://github.com/vivekmattam02/ERC-3-earthrover-challenge
    language: Python
    description: Autonomous rover challenge codebase for Earth Rover Challenge 3, centered on robotics system integration and Python-based autonomy workflows.
    tags: [robotics, rover, autonomy]

  - name: SG-Nav
    repo: GuoZheXinDeGuang/SG-Nav
    url: https://github.com/GuoZheXinDeGuang/SG-Nav
    language: Jupyter Notebook / Python
    description: Scene-graph-based zero-shot object navigation project using VLM reasoning, Habitat simulation, Matterport3D ObjectNav episodes, Grounded SAM, GLIP, and related perception modules.
    tags: [object navigation, scene graph, VLM, Habitat]

  - name: SpaceDoggy
    repo: GuoZheXinDeGuang/SpaceDoggy
    url: https://github.com/GuoZheXinDeGuang/SpaceDoggy
    language: Python
    description: Reinforcement learning project for quadrupedal landing control in low-gravity environments.
    tags: [reinforcement learning, quadruped, control]

  - name: Physics Representation Learning
    repo: GuoZheXinDeGuang/Physics-Representation-Learning
    url: https://github.com/GuoZheXinDeGuang/Physics-Representation-Learning
    language: Python
    description: Self-supervised representation learning for spatiotemporal physical systems, comparing JEPA, VideoMAE-style masked autoencoding, and DynaMo on The Well active_matter dataset.
    tags: [self-supervised learning, physics, representation learning]

  - name: Bimaminobolonana
    repo: jaron-cui/bimaminobolonana
    url: https://github.com/jaron-cui/bimaminobolonana
    language: Jupyter Notebook / Python
    description: Bimanual robot manipulation project with visual encoders and an ACT (Action Chunking Transformer) policy, including CLIP/Pri3D-style encoders and training/inference scripts.
    tags: [robot manipulation, ACT, visual encoders]
